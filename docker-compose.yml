services:
  db:
    image: postgres:13
    container_name: postgres-popub
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: moyp5008
      POSTGRES_DB: popub_learn
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
